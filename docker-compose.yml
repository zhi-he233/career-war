services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
    expose:
      - "3001"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
